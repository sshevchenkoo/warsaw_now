[defaults]
# Only the DigitalOcean ELK droplet is provisioned by Ansible now; `make do-elk`
# renders and passes the DO inventory with -i.
inventory         = inventory.do.yml
remote_user       = root
# FIX: key from the project's .ssh/ folder — set via ANSIBLE_PRIVATE_KEY_FILE in the Makefile
# The Makefile passes: ANSIBLE_PRIVATE_KEY_FILE=../../.ssh/id_ed25519
private_key_file  = ../../.ssh/id_ed25519
host_key_checking = False
stdout_callback   = yaml
gathering         = smart

[ssh_connection]
pipelining  = True
ssh_args    = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
