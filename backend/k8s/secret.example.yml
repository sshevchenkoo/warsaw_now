# Template for the warsaw-secrets Secret. DO NOT commit a filled-in copy.
# Apply the real one with kubectl (see docs/deployment.md), or copy this to
# secret.yml (gitignored), fill it, and `kubectl apply -f secret.yml`.
apiVersion: v1
kind: Secret
metadata:
  name: warsaw-secrets
  namespace: warsaw
type: Opaque
stringData:
  # POSTGRES_* are only needed if you run the in-cluster Postgres StatefulSet
  # (10-postgres.yml). On DigitalOcean with a managed database, skip 10-postgres.yml
  # and set DATABASE_URL to the managed URI (terraform output -raw database_url) —
  # it already includes ?sslmode=require.
  POSTGRES_USER: app
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: events
  DATABASE_URL: postgresql+psycopg://app:change-me@postgres:5432/events
  ANTHROPIC_API_KEY: sk-ant-...
  VOYAGE_API_KEY: pa-...
  APIFY_TOKEN: apify_api_...
  TICKETMASTER_API_KEY: "..."   # Consumer Key from developer.ticketmaster.com
  GOOGLE_CLIENT_ID: "..."          # OAuth 2.0 Web client (console.cloud.google.com)
  GOOGLE_CLIENT_SECRET: "..."
  SESSION_SECRET: "..."            # long random string; signs the session cookie
  RESEND_API_KEY: "re_..."         # Resend API key (email verification); blank = no-op
  EMAIL_FROM: "Warsaw Events <noreply@transendance.online>"  # verified Resend sender (NOT a @gmail.com)
  EMAIL_REPLY_TO: "you@example.com"  # optional: replies to verification mail land here
