# Redis for the (future) query cache. Wired into infra now so it is ready
# when the cache layer lands in code.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: warsaw
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: warsaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999   # redis uid in redis:7-alpine
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            # redis writes its working dir (/data) even without persistence;
            # readOnlyRootFilesystem needs it backed by a writable volume.
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
