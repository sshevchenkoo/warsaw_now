# One CronJob per source: same image as the API, command selects the source.
# A new source = copy a block and change --source + schedule.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ingest-places
  namespace: warsaw
spec:
  schedule: "0 4 * * 1" # Mondays 04:00 — permanent places change rarely
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: ingest
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ingest
              image: ghcr.io/${GITHUB_USER}/warsaw-events:${IMAGE_TAG}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command: ["python", "-m", "app.ingestion.runner", "--source=places"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: warsaw-secrets
                      key: DATABASE_URL
                - name: VOYAGE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: warsaw-secrets
                      key: VOYAGE_API_KEY
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: warsaw-secrets
                      key: ANTHROPIC_API_KEY
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
