# Single domain for the whole app: the frontend at /, and the API at its known
# paths (/search, /health, /auth, /me, /upcoming, /items, /avatars, /users, /friends, /share). Same origin, so the browser uses relative
# API calls (and the session cookie is first-party) with no CORS in production.
# nginx matches the most specific prefix, so these paths go to the API and
# everything else to the web frontend.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: warsaw
  namespace: warsaw
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # SSE: disable response buffering and allow a long-lived stream so the
    # /search events reach the client as they are produced.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${WARSAW_DOMAIN}
      secretName: warsaw-tls
  rules:
    - host: ${WARSAW_DOMAIN}
      http:
        paths:
          - path: /search
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /me
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /upcoming
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /items
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /avatars
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /friends
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /share
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
