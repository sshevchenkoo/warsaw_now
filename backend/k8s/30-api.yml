# FastAPI app. Stateless → scaled by replicas + HPA. Same image as the
# ingestion CronJobs; here the default CMD (uvicorn) runs.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: warsaw
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: warsaw
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/${GITHUB_USER}/warsaw-events:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://redis.warsaw.svc.cluster.local:6379/0"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: ANTHROPIC_API_KEY
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: VOYAGE_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: warsaw
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
