# FastAPI app. Stateless → scaled by replicas + HPA. Same image as the
# ingestion CronJobs; here the default CMD (uvicorn) runs.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: warsaw
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: warsaw
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001   # make the writable /tmp emptyDir owned by the app user
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/${GITHUB_USER}/warsaw-events:${IMAGE_TAG}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://redis.warsaw.svc.cluster.local:6379/0"
            # Observability: export traces to the OTel Collector in `monitoring`
            # (which forwards to Tempo). Metrics are scraped from /metrics.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "warsaw-events-api"
            # Auth: the app is served from one HTTPS domain, so the OAuth
            # redirect + session cookie use that origin.
            - name: FRONTEND_URL
              value: "https://${WARSAW_DOMAIN}"
            - name: SESSION_HTTPS_ONLY
              value: "true"
            # Same-origin in prod (ingress serves app + API), but the prod config
            # validator rejects the "*" default — pin it to the app origin.
            - name: CORS_ORIGINS
              value: '["https://${WARSAW_DOMAIN}"]'
            # Runtime role is least-privilege DML-only (audit #4) — no DDL on
            # startup; schema is managed by `make do-db-migrate`.
            - name: DB_BOOTSTRAP
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: ANTHROPIC_API_KEY
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: VOYAGE_API_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: SESSION_SECRET
            # Transactional email (Resend). All optional: without RESEND_API_KEY
            # sending is a logged no-op, so a missing key must not crash the pod.
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: RESEND_API_KEY
                  optional: true
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: EMAIL_FROM
                  optional: true
            - name: EMAIL_REPLY_TO
              valueFrom:
                secretKeyRef:
                  name: warsaw-secrets
                  key: EMAIL_REPLY_TO
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # readOnlyRootFilesystem is on, so give the process a writable scratch dir.
        - name: tmp
          emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: warsaw
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
