mode: deployment

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    batch:
      timeout: 5s

  exporters:
    # Traces → Tempo
    otlp/tempo:
      endpoint: "tempo.monitoring:4317"
      tls:
        insecure: true

    # Metrics → expose /metrics for Prometheus to scrape
    prometheus:
      endpoint: "0.0.0.0:8889"

  service:
    pipelines:
      traces:
        receivers:  [otlp]
        processors: [batch]
        exporters:  [otlp/tempo]
      metrics:
        receivers:  [otlp]
        processors: [batch]
        exporters:  [prometheus]

service:
  type: ClusterIP
  ports:
    otlp-grpc:
      port: 4317
      protocol: TCP
    otlp-http:
      port: 4318
      protocol: TCP
    prometheus:
      port: 8889
      protocol: TCP

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
