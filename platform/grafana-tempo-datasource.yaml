# Registers Tempo as a Grafana datasource via the kube-prometheus-stack sidecar
# (picked up by the grafana_datasource label) so traces are queryable in Grafana.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-tempo
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        url: http://tempo:3100
        access: proxy
        isDefault: false
