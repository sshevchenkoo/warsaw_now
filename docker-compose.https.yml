# HTTPS deploy: same stack as docker-compose.host.yml, but fronted by Caddy, which
# terminates TLS (auto Let's Encrypt cert for $DOMAIN) and reverse-proxies to web.
# Only Caddy is published (80/443); web/api/db/redis stay on the internal network.
#
#   # in a repo-root .env: DOMAIN=example.com  (and the A record example.com -> server IP)
#   docker compose -f docker-compose.https.yml up -d --build
#
# Uses the same project/volume as docker-compose.host.yml (the dir name), so the
# pgdata volume — and its seeded data — carries over when switching http -> https.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: events
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d events"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://app:${POSTGRES_PASSWORD:-app}@db:5432/events
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: https://${DOMAIN}
      SESSION_HTTPS_ONLY: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
